name: Deploy

# Деплой на боевой сервер при пуше тега версии (vX.Y.Z), который создаёт `npm run release`.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # ручной запуск при необходимости

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write # для создания GitHub Release

jobs:
  deploy:
    name: Build & deploy static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build # → out/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 138.16.184.155 >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            out/ root@138.16.184.155:/var/www/obninskstation.ru/html/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
