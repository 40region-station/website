server {
    server_name amo.obninskstation.ru;

    # Тот же корень, что и у основного сайта — ассеты (/_next, /fest/og.png) общие.
    root /var/www/obninskstation.ru/html;
    index index.html;

    # Корень поддомена отдаёт лендинг фестиваля (сборка лежит в /fest/).
    location = / {
        try_files /fest/index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/amo.obninskstation.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/amo.obninskstation.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = amo.obninskstation.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name amo.obninskstation.ru;
    return 404; # managed by Certbot


}